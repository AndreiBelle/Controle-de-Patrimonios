<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastros de patrimônios</title>
    <link rel="stylesheet" href="../styles/importacao.css">
</head>
<body>
    
    <div class="container">
        <form class="Importar-cadastro" id="importacao-form" onsubmit="enviarDados(event)" enctype="multipart/form-data">
            <h1 class="titulo-importacao">Importar Cadastros</h1>
            <div class="form">
                <label class="titulo-import">Selecione o arquivo para importar:</label>
                <input type="file" id="excel" name="excel" accept=".xlsx, .xls">
                <input type="submit" value="Enviar">
            </div>
        </form>
    </div>

    <script>
        async function enviarDados(event) {
            event.preventDefault();

            const form = document.getElementById("importacao-form");
            const formData = new FormData(form)

            try{
                const dados = await fetch('/importacao', {
                    method: 'POST',
                    body: formData
                });

                const resposta = await dados.json()

                if(resposta.ok) {
                    alert("Importação deu certo!")
                } else {
                    alert(dados.mensagem)
                }
            } catch(err) {
                console.log("Erro: ",err)
                alert(err)
            }
        }

    </script>
</body>
</html>
